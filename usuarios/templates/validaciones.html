{% extends 'base.html' %}

{% block content %}

<div class="glass p-5">

    <h1 class="fw-bold mb-4">
        Validaciones
    </h1>

    {% for operador in pendientes %}

    <div class="p-3 mb-3 bg-dark rounded">

        <h5>{{ operador.nombre }}</h5>

        <p>{{ operador.ciudad }}</p>

        <span class="badge bg-warning">
            En revisión
        </span>

    </div>

    {% endfor %}

</div>

{% endblock %}
